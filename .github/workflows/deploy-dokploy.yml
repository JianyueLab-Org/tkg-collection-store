name: Deploy

on:
  workflow_run:
    workflows: ["Core Check", "CodeQL"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: JianyueLab-Org/actions/.github/workflows/deploy-dokploy.yml@main
    with:
      sha: ${{ github.event.workflow_run.head_sha }}
    secrets: inherit
